name: CI

on:
  push:
    branches: [main, dev_1]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        run: npx prisma generate

      - name: Check schema drift
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --exit-code || echo "⚠ Schema drift detected — run prisma migrate dev"

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "ci-test-secret-that-is-at-least-32-chars-long"

      - name: Unit tests
        run: pnpm test:run
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          JWT_SECRET: "ci-test-secret-that-is-at-least-32-chars-long"
          NODE_ENV: "test"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tcs
          POSTGRES_PASSWORD: tcs_ci
          POSTGRES_DB: tcs_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tcs"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://tcs:tcs_ci@localhost:5432/tcs_dashboard"
      JWT_SECRET: "ci-test-secret-that-is-at-least-32-chars-long"
      NODE_ENV: "test"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate & migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Seed database
        run: pnpm db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
