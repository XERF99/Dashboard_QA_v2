# ══════���════════════════════════════════════════════════════
#  Docker Compose — Production
#
#  Uso:
#    docker compose up -d --build
#
#  Requiere las siguientes variables de entorno (o .env):
#    DATABASE_URL, JWT_SECRET
# ══��════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tcs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-tcs_dashboard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tcs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tcs}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tcs_dashboard}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_SECRET_PREVIOUS: ${JWT_SECRET_PREVIOUS:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
